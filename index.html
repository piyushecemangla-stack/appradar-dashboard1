const APP = {name:"StreamMax",fullName:"StreamMax — Video Streaming App",pkg:"com.streammax.app",icon:"📺"};

const cc = v => v===null?"#4a6080":v<0.5?"#00e676":v<1.5?"#ffab00":"#ff3355";
const cl = v => v===null?"N/A":v.toFixed(2)+"%";
const sc = s => s==="done"?"#00e676":s==="active"?"#00d4ff":"#2d4060";

const m = {fontFamily:"'JetBrains Mono',monospace"};

function Tag({sk}){
  const p=PLATFORMS[sk];
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:5,background:p.bg,border:`1px solid ${p.border}`,color:p.color,...m,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{p.icon} {p.short}</span>;
}

function Badge({status,small}){
  const s=STATUS[status]||STATUS.pending;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:small?"2px 7px":"3px 10px",borderRadius:20,background:s.bg,border:`1px solid ${s.border}`,color:s.color,...m,fontSize:small?9:10,fontWeight:700,whiteSpace:"nowrap"}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:s.color,display:"inline-block"}}/>{s.label}
  </span>;
}

function ForceModal({platform,onConfirm,onClose}){
  const p=PLATFORMS[platform.id];
  const [pct,setPct]=useState(platform.rollout||100);
  const [forceOn,setForceOn]=useState(platform.force);
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",backdropFilter:"blur(8px)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0a0f1e",border:"1px solid #243050",borderRadius:18,width:"100%",maxWidth:440}}>
        <div style={{background:"#0f1628",borderBottom:"1px solid #1a2540",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:"18px 18px 0 0"}}>
          <div><div style={{fontSize:17,fontWeight:700,color:"#fff"}}>⚡ Rollout Control</div><div style={{marginTop:5}}><Tag sk={platform.id}/></div></div>
          <button onClick={onClose} style={{background:"#141d35",border:"1px solid #1a2540",borderRadius:7,width:28,height:28,cursor:"pointer",color:"#4a6080",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{padding:20}}>
          <div style={{background:"rgba(255,51,85,.07)",border:"1px solid rgba(255,51,85,.2)",borderRadius:9,padding:12,marginBottom:16,fontSize:12,color:"#c8d8f0",lineHeight:1.6}}>⚠️ <strong style={{color:"#ff3355"}}>Force Mode</strong> = users <strong style={{color:"#ff3355"}}>cannot use app</strong> without updating. Use only for critical fixes.</div>
          <div style={{marginBottom:18}}>
            <div style={{...m,fontSize:9,color:"#4a6080",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>ROLLOUT PERCENTAGE</div>
            <input type="range" min={0} max={100} value={pct} onChange={e=>setPct(Number(e.target.value))}/>
            <div style={{...m,fontSize:32,fontWeight:700,color:pct===100?"#00d4ff":"#ffab00",textAlign:"center",letterSpacing:2,margin:"6px 0"}}>{pct}%</div>
          </div>
          <div onClick={()=>setForceOn(!forceOn)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0f1628",border:"1px solid #1a2540",borderRadius:9,padding:"12px 16px",marginBottom:16,cursor:"pointer"}}>
            <div><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>Force Update Mode</div><div style={{fontSize:11,color:"#4a6080",marginTop:2}}>Mandatory update for all users</div></div>
            <div style={{width:44,height:24,borderRadius:12,background:forceOn?"#ff3355":"#1a2540",position:"relative",transition:"background .2s",border:`1px solid ${forceOn?"#ff3355":"#243050"}`,flexShrink:0}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:forceOn?22:2,transition:"left .2s"}}/>
            </div>
          </div>
          <button onClick={()=>onConfirm(pct,forceOn)} style={{width:"100%",padding:12,borderRadius:9,border:"none",cursor:"pointer",fontSize:14,fontWeight:700,color:"#fff",background:forceOn&&pct===100?"linear-gradient(135deg,#9b1c2e,#ff3355)":"linear-gradient(135deg,#0055ff,#00d4ff)",letterSpacing:1}}>
            {forceOn&&pct===100?"⚡ DEPLOY FORCE UPDATE":`📈 SET ROLLOUT TO ${pct}%`}
          </button>
          <button onClick={onClose} style={{width:"100%",padding:9,borderRadius:8,border:"1px solid #1a2540",background:"transparent",color:"#4a6080",cursor:"pointer",fontSize:13,fontWeight:600,marginTop:8}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function DeployModal({platformId,onClose}){
  const steps=DEPLOY_GUIDE[platformId];
  const p=PLATFORMS[platformId];
  if(!steps)return null;
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(8px)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#0a0f1e",border:"1px solid #243050",borderRadius:18,width:"100%",maxWidth:660,maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{background:"#0f1628",borderBottom:"1px solid #1a2540",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:2,borderRadius:"18px 18px 0 0"}}>
          <div><div style={{fontSize:18,fontWeight:700,color:"#fff"}}>🚀 Deployment Guide</div><div style={{marginTop:5}}><Tag sk={platformId}/></div></div>
          <button onClick={onClose} style={{background:"#141d35",border:"1px solid #1a2540",borderRadius:7,width:28,height:28,cursor:"pointer",color:"#4a6080",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{padding:22}}>
          {steps.map((step,i)=>{
            const col=sc(step.status);
            const done=step.status==="done",active=step.status==="active";
            return (
              <div key={i} style={{display:"flex",gap:14,marginBottom:4}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:done?"rgba(0,230,118,.15)":active?"rgba(0,212,255,.15)":"#0f1628",border:`2px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:col}}>{done?"✓":step.n}</div>
                  {i<steps.length-1&&<div style={{width:2,flex:1,minHeight:16,background:done?"rgba(0,230,118,.3)":"#1a2540",margin:"3px 0"}}/>}
                </div>
                <div style={{flex:1,paddingBottom:18}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:700,color:done?"#00e676":active?"#00d4ff":"#c8d8f0"}}>{step.title}</span>
                    <span style={{...m,fontSize:9,padding:"2px 7px",borderRadius:4,background:`${col}15`,color:col,border:`1px solid ${col}33`}}>{done?"DONE":active?"IN PROGRESS":"UPCOMING"}</span>
                  </div>
                  <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,marginBottom:step.cmd?8:0}}>{step.desc}</div>
                  {step.cmd&&<div style={{background:"#050810",border:"1px solid #1a2540",borderRadius:8,padding:"10px 14px",marginTop:6}}>
                    <div style={{...m,fontSize:9,color:"#4a6080",marginBottom:5,letterSpacing:1}}>COMMAND</div>
                    <pre style={{...m,fontSize:11,color:"#00e676",margin:0,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{step.cmd}</pre>
                  </div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

        <div style={{background:"#0f1628",borderBottom:"1px solid #1a2540",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:2,borderRadius:"18px 18px 0 0"}}>

              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<5?"1px solid rgba(26,37,64,0.5)":"none"}}>

          </div>
          {plat.remarks&&<div style={{background:plat.status==="rejected"?"rgba(255,51,85,.06)":"rgba(255,171,0,.06)",border:`1px solid ${plat.status==="rejected"?"rgba(255,51,85,.3)":"rgba(255,171,0,.3)"}`,borderLeft:`3px solid ${plat.status==="rejected"?"#ff3355":"#ffab00"}`,borderRadius:9,padding:12,marginBottom:14,fontSize:12,color:"#c8d8f0",lineHeight:1.6}}>💬 {plat.remarks}</div>}
          <div style={{marginBottom:16}}>
            <div style={{...m,fontSize:9,color:"#4a6080",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:10,paddingBottom:7,borderBottom:"1px solid #1a2540"}}>Version History</div>
            {plat.history.map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid rgba(26,37,64,.4)"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:"#00e676",flexShrink:0}}/>
                <span style={{...m,fontSize:12,fontWeight:700,color:"#00d4ff",width:55}}>v{h.v}</span>
                <span style={{...m,fontSize:10,color:"#4a6080",width:55}}>#{h.bld}</span>
                <Badge status={h.status} small/>
                <span style={{...m,fontSize:10,color:"#4a6080",marginLeft:"auto"}}>{h.date}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>{onClose();onDeploy(plat.id);}} style={{padding:"9px 16px",borderRadius:8,border:"1px solid rgba(0,212,255,.3)",background:"rgba(0,212,255,.08)",color:"#00d4ff",cursor:"pointer",fontWeight:700,fontSize:13}}>🚀 Deploy Guide</button>
            <button onClick={()=>{onClose();onForce(plat);}} style={{padding:"9px 16px",borderRadius:8,border:"1px solid rgba(255,51,85,.3)",background:"rgba(255,51,85,.08)",color:"#ff3355",cursor:"pointer",fontWeight:700,fontSize:13}}>⚡ Rollout / Force</button>
            <button onClick={onClose} style={{padding:"9px 16px",borderRadius:8,border:"1px solid #1a2540",background:"transparent",color:"#4a6080",cursor:"pointer",fontWeight:600,fontSize:13}}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Dashboard(){
  const [platforms,setPlatforms]=useState(JSON.parse(JSON.stringify(PLATFORMS_DATA)));
  const [tab,setTab]=useState("dashboard");
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [detail,setDetail]=useState(null);
  const [forceModal,setForceModal]=useState(null);
  const [deployModal,setDeployModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [clock,setClock]=useState("");
  const [spinning,setSpinning]=useState(false);
  const [dateFrom,setDateFrom]=useState("2026-02-28");
  const [dateTo,setDateTo]=useState("2026-03-06");
  const [preset,setPreset]=useState("7d");

  useEffect(()=>{
    const t=setInterval(()=>setClock(new Date().toLocaleTimeString("en-IN",{hour12:false})),1000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{
    const t=setInterval(()=>{
      setPlatforms(prev=>prev.map(p=>({...p,
        crash:p.crash!==null?Math.max(0.05,parseFloat((p.crash+(Math.random()-.5)*.06).toFixed(2))):null,
        anr:p.anr!==null?Math.max(0.01,parseFloat((p.anr+(Math.random()-.5)*.03).toFixed(2))):null,
      })));
    },30000);
    return()=>clearInterval(t);
  },[]);

  const showToast=(icon,msg)=>{setToast({icon,msg});setTimeout(()=>setToast(null),3000);};

  const doRefresh=()=>{
    setSpinning(true);
    setTimeout(()=>{
      setPlatforms(prev=>prev.map(p=>({...p,
        crash:p.crash!==null?Math.max(0.05,parseFloat((p.crash+(Math.random()-.5)*.12).toFixed(2))):null,
        anr:p.anr!==null?Math.max(0.01,parseFloat((p.anr+(Math.random()-.5)*.05).toFixed(2))):null,
      })));
      setSpinning(false);
      showToast("🔄","Data refreshed successfully");
    },800);
  };

  const handleForceConfirm=(pct,forceMode)=>{
    setPlatforms(prev=>prev.map(p=>p.id===forceModal.id?{...p,rollout:pct,force:forceMode}:p));
    showToast(forceMode&&pct===100?"⚡":"📈",`${PLATFORMS[forceModal.id].short} → ${pct}%${forceMode?" · Force ON":""}`);
    setForceModal(null);
  };

  const doPreset=(p)=>{
    setPreset(p);
    const off={"7d":7,"30d":30,"90d":90,"ytd":65,"all":365};
    const now=new Date("2026-03-06");const from=new Date(now);from.setDate(from.getDate()-(off[p]||7));
    setDateFrom(from.toISOString().split("T")[0]);setDateTo("2026-03-06");
  };

  const stats={
    total:platforms.length,
    approved:platforms.filter(p=>["approved","live"].includes(p.status)).length,
    review:platforms.filter(p=>p.status==="review").length,
    rejected:platforms.filter(p=>p.status==="rejected").length,
    pending:platforms.filter(p=>p.status==="pending").length,
    forced:platforms.filter(p=>p.force).length,
    worstCrash:[...platforms].filter(p=>p.crash!==null).sort((a,b)=>b.crash-a.crash)[0],
    worstAnr:[...platforms].filter(p=>p.anr!==null).sort((a,b)=>b.anr-a.anr)[0],
  };

  const q=search.toLowerCase();
  const filtered=platforms.filter(p=>{
    const mf=filter==="all"||p.status===filter||(filter==="force"&&p.force)||(filter==="highcrash"&&p.crash>=1.5);
    const ms=!q||PLATFORMS[p.id].name.toLowerCase().includes(q)||p.currentVer.includes(q)||p.status.includes(q);
    return mf&&ms;
  });

  return (
    <div style={{background:"#05080f",minHeight:"100vh",color:"#c8d8f0",fontFamily:"'Rajdhani',sans-serif",fontSize:14}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px)",backgroundSize:"50px 50px",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1}}>

        {/* HEADER */}
        <header style={{background:"linear-gradient(135deg,#0a0f1e,#0f1628)",borderBottom:"1px solid #1a2540",padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#00d4ff,#0055ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 0 18px rgba(0,212,255,.4)",flexShrink:0}}>📡</div>
            <div>
              <div style={{fontSize:20,fontWeight:700,letterSpacing:2,color:"#fff",lineHeight:1}}>App<span style={{color:"#00d4ff"}}>Radar</span> <span style={{fontSize:12,color:"#4a6080",fontWeight:400}}>PRO</span></div>
              <div style={{...m,fontSize:8,color:"#4a6080",letterSpacing:2}}>1 APP · 9 PLATFORMS · LIVE</div>
            </div>
          </div>

            <div>
              <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>{APP.fullName}</div>

            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>

            <button onClick={doRefresh} style={{display:"flex",alignItems:"center",gap:4,background:"#141d35",border:"1px solid #1a2540",borderRadius:8,padding:"6px 13px",color:"#c8d8f0",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>

            <button key={t} onClick={()=>setTab(t)} style={{padding:"11px 18px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,letterSpacing:.5,color:tab===t?"#00d4ff":"#4a6080",borderBottom:tab===t?"2px solid #00d4ff":"2px solid transparent",transition:"all .2s"}}>

                  <div style={{...m,fontSize:8,color:"#4a6080",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{sc2.l}</div>

                        <span style={{...m,fontSize:11,fontWeight:700,color:roCol,width:34,flexShrink:0}}>{plat.rollout}%</span>
                        <div style={{flex:1,height:5,background:"#1a2540",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${plat.rollout}%`,background:roGrad,borderRadius:3,transition:"width .5s",boxShadow:plat.rollout===100?`0 0 7px ${roCol}55`:"none"}}/>
                        </div>
                        {plat.force&&<span style={{...m,fontSize:9,color:"#ff3355",fontWeight:700}}>⚡</span>}
                      </div>
                      <div style={{display:"flex",gap:5,marginLeft:"auto"}} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>setForceModal(plat)} style={{display:"inline-flex",alignItems:"center",gap:3,background:plat.force?"rgba(255,51,85,.2)":"rgba(255,51,85,.08)",border:`1px solid ${plat.force?"#ff3355":"rgba(255,51,85,.25)"}`,borderRadius:5,padding:"4px 9px",cursor:"pointer",...m,fontSize:9,fontWeight:700,color:"#ff3355",whiteSpace:"nowrap",boxShadow:plat.force?"0 0 8px rgba(255,51,85,.35)":"none"}}>
                          {plat.force?"⚡ FORCED":"⚡ Force"}
                        </button>
                        {hasGuide&&<button onClick={()=>setDeployModal(plat.id)} style={{display:"inline-flex",alignItems:"center",gap:3,background:"rgba(0,212,255,.07)",border:"1px solid rgba(0,212,255,.2)",borderRadius:5,padding:"4px 9px",cursor:"pointer",...m,fontSize:9,color:"#00d4ff"}}>🚀</button>}
                      </div>
                      <div style={{flex:"1 1 130px",minWidth:0}}>
                        {plat.remarks?<div style={{fontSize:10,color:"#4a6080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={plat.remarks}>{plat.remarks}</div>:<span style={{...m,fontSize:9,color:"#2d4060",fontStyle:"italic"}}>—</span>}
                        <div style={{...m,fontSize:9,color:"#2d4060",marginTop:1}}>{plat.lastUpdated}</div>
                      </div>
                    </div>
                    {(plat.status==="rejected"||plat.status==="review")&&plat.remarks&&(
                      <div style={{borderTop:`1px solid ${plat.status==="rejected"?"rgba(255,51,85,.2)":"rgba(255,171,0,.15)"}`,background:plat.status==="rejected"?"rgba(255,51,85,.04)":"rgba(255,171,0,.04)",padding:"7px 14px",display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:11}}>{plat.status==="rejected"?"❌":"🔄"}</span>
                        <span style={{fontSize:11,color:plat.status==="rejected"?"#ff3355":"#ffab00",flex:1}}>{plat.remarks}</span>
                        {hasGuide&&<button onClick={()=>setDeployModal(plat.id)} style={{padding:"3px 10px",borderRadius:5,border:`1px solid ${plat.status==="rejected"?"rgba(255,51,85,.3)":"rgba(255,171,0,.3)"}`,background:"transparent",color:plat.status==="rejected"?"#ff3355":"#ffab00",cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0,fontFamily:"'Rajdhani',sans-serif"}}>🚀 Fix Guide</button>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </>}

          {tab==="deploy"&&(
            <div>
              <div style={{background:"rgba(0,85,255,.06)",border:"1px solid rgba(0,85,255,.2)",borderRadius:11,padding:"13px 16px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:22}}>🚀</span>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>Step-by-Step Deployment Guide</div>
                  <div style={{fontSize:11,color:"#4a6080",marginTop:2}}>Click any platform card to see full deployment steps, CLI commands, and current progress.</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                {platforms.map(plat=>{
                  const p=PLATFORMS[plat.id];
                  const guide=DEPLOY_GUIDE[plat.id];
                  const done=guide?guide.filter(s=>s.status==="done").length:0;
                  const total=guide?guide.length:0;
                  const pct=total?Math.round((done/total)*100):0;
                  return (
                    <div key={plat.id} onClick={()=>guide&&setDeployModal(plat.id)}
                      style={{background:"#0a0f1e",border:`1px solid ${p.border}`,borderRadius:11,padding:14,cursor:guide?"pointer":"default",transition:"all .2s",opacity:guide?1:.5}}
                      onMouseEnter={e=>{if(guide)e.currentTarget.style.background="#0f1628";}}
                      onMouseLeave={e=>{if(guide)e.currentTarget.style.background="#0a0f1e";}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{display:"flex",alignItems:"center",gap:9}}>
                          <div style={{width:34,height:34,borderRadius:8,background:p.bg,border:`1px solid ${p.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{p.icon}</div>
                          <div><div style={{fontWeight:700,color:"#fff",fontSize:13}}>{p.name}</div><div style={{marginTop:3}}><Badge status={plat.status} small/></div></div>
                        </div>
                        {guide&&<span style={{color:"#4a6080",fontSize:16}}>›</span>}
                      </div>
                      {guide?(<>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{...m,fontSize:8,color:"#4a6080",letterSpacing:1}}>PROGRESS</span>
                          <span style={{...m,fontSize:9,color:pct===100?"#00e676":pct>0?"#00d4ff":"#4a6080",fontWeight:700}}>{done}/{total} done</span>
                        </div>
                        <div style={{height:4,background:"#1a2540",borderRadius:2,overflow:"hidden",marginBottom:8}}>
                          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"linear-gradient(90deg,#00bfa5,#00e676)":"linear-gradient(90deg,#0055ff,#00d4ff)",borderRadius:2,transition:"width .5s"}}/>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:4}}>
                          {guide.slice(0,3).map((step,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                              <span style={{color:sc(step.status),fontSize:11}}>{step.status==="done"?"✓":step.status==="active"?"►":"○"}</span>
                              <span style={{color:step.status==="done"?"#64748b":step.status==="active"?"#c8d8f0":"#2d4060"}}>{step.title}</span>
                            </div>
                          ))}
                          {guide.length>3&&<div style={{fontSize:9,...m,color:"#4a6080",marginTop:2}}>+{guide.length-3} more steps →</div>}
                        </div>
                      </>):<div style={{fontSize:11,color:"#4a6080",fontStyle:"italic"}}>Guide coming soon</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {detail&&<DetailModal plat={detail} onClose={()=>setDetail(null)} onForce={p=>{setDetail(null);setForceModal(p);}} onDeploy={id=>{setDetail(null);setDeployModal(id);setTab("deploy");}}/>}
      {forceModal&&<ForceModal platform={forceModal} onConfirm={handleForceConfirm} onClose={()=>setForceModal(null)}/>}
      {deployModal&&<DeployModal platformId={deployModal} onClose={()=>setDeployModal(null)}/>}
      {toast&&<div style={{position:"fixed",bottom:20,right:20,background:"#0f1628",border:"1px solid #243050",borderRadius:9,padding:"9px 15px",fontSize:12,zIndex:9999,display:"flex",alignItems:"center",gap:6,boxShadow:"0 8px 24px rgba(0,0,0,.4)",color:"#c8d8f0",animation:"fadeIn .25s ease"}}><span>{toast.icon}</span><span>{toast.msg}</span></div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard/>);
</script>
</body>
</html>
