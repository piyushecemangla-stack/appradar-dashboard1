<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AppRadar PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05080f;color:#c8d8f0;font-family:'Rajdhani',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1a2540;border-radius:3px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const API = window.location.origin;

const STORES = [
  {id:'google', name:'Google Play Store',      icon:'\u25b6',  color:'#34d399', bg:'rgba(52,211,153,.12)',  border:'rgba(52,211,153,.3)',  authType:'oauth',
   fields:[], note:'Click Login — you will be redirected to Google to authorize'},
  {id:'apple',  name:'Apple App Store',         icon:'\ud83c\udf4e', color:'#60a5fa', bg:'rgba(96,165,250,.12)',  border:'rgba(96,165,250,.3)',  authType:'form',
   fields:[{key:'keyId',label:'Key ID',type:'text',placeholder:'XXXXXXXXXX'},{key:'issuerId',label:'Issuer ID',type:'text',placeholder:'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx'},{key:'privateKey',label:'Private Key (.p8 file contents)',type:'textarea',placeholder:'-----BEGIN PRIVATE KEY-----\nMIGH...\n-----END PRIVATE KEY-----'}],
   note:'appstoreconnect.apple.com -> Users & Access -> Keys'},
  {id:'amazon', name:'Amazon Fire TV / Appstore',icon:'\ud83d\udd25', color:'#fb923c', bg:'rgba(251,146,60,.12)',  border:'rgba(251,146,60,.3)',  authType:'form',
   fields:[{key:'clientId',label:'Client ID',type:'text',placeholder:'amzn1.application-oa2-client.xxx'},{key:'clientSecret',label:'Client Secret',type:'password',placeholder:'••••••••••'}],
   note:'developer.amazon.com -> Settings -> Security Profiles -> API Keys'},
  {id:'samsung',name:'Samsung Galaxy Store',    icon:'\u2b21',  color:'#a78bfa', bg:'rgba(167,139,250,.12)', border:'rgba(167,139,250,.3)', authType:'form',
   fields:[{key:'clientId',label:'Client ID',type:'text',placeholder:'Client ID'},{key:'clientSecret',label:'Client Secret',type:'password',placeholder:'••••••••••'}],
   note:'seller.samsungapps.com -> Account -> Seller API'},
  {id:'lg',     name:'LG Content Store',        icon:'\u25c8',  color:'#f87171', bg:'rgba(248,113,113,.12)', border:'rgba(248,113,113,.3)', authType:'form',
   fields:[{key:'apiKey',label:'API Key',type:'text',placeholder:'Your API Key'},{key:'secretKey',label:'Secret Key',type:'password',placeholder:'••••••••••'}],
   note:'seller.lgappstv.com -> My Account -> API Management'},
  {id:'roku',   name:'Roku Channel Store',      icon:'\u25c9',  color:'#fbbf24', bg:'rgba(251,191,36,.12)',  border:'rgba(251,191,36,.3)',  authType:'form',
   fields:[{key:'clientId',label:'Client ID',type:'text',placeholder:'Client ID'},{key:'clientSecret',label:'Client Secret',type:'password',placeholder:'••••••••••'}],
   note:'developer.roku.com -> Dashboard -> API Keys'},
];

const ST = {
  approved:{label:'APPROVED', color:'#00e676',bg:'rgba(0,230,118,.1)', border:'rgba(0,230,118,.3)'},
  rejected:{label:'REJECTED', color:'#ff3355',bg:'rgba(255,51,85,.1)', border:'rgba(255,51,85,.3)'},
  review:  {label:'IN REVIEW',color:'#ffab00',bg:'rgba(255,171,0,.1)', border:'rgba(255,171,0,.3)'},
  pending: {label:'PENDING',  color:'#64748b',bg:'rgba(100,116,139,.1)',border:'rgba(100,116,139,.3)'},
};
const mn = {fontFamily:"'JetBrains Mono',monospace"};
const cc = v => v===null?'#4a6080':v<0.5?'#00e676':v<1.5?'#ffab00':'#ff3355';
const cl = v => v===null?'N/A':v.toFixed(2)+'%';

function Badge({status}){const s=ST[status]||ST.pending;return<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:20,background:s.bg,border:`1px solid ${s.border}`,color:s.color,...mn,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}><span style={{width:5,height:5,borderRadius:'50%',background:s.color,display:'inline-block'}}/>{s.label}</span>;}

function ConnectModal({store,onSuccess,onClose}){
  const[vals,setVals]=useState({});
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[done,setDone]=useState(false);

  if(store.authType==='oauth'){
    return<div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',backdropFilter:'blur(10px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'#0a0f1e',border:`1px solid ${store.border}`,borderRadius:20,width:'100%',maxWidth:400,overflow:'hidden'}}>
        <div style={{background:'#0f1628',borderBottom:'1px solid #1a2540',padding:'18px 22px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:40,height:40,borderRadius:10,background:store.bg,border:`1px solid ${store.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{store.icon}</div>
            <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>Connect {store.name}</div>
          </div>
          <button onClick={onClose} style={{background:'#141d35',border:'1px solid #1a2540',borderRadius:7,width:28,height:28,cursor:'pointer',color:'#4a6080',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>x</button>
        </div>
        <div style={{padding:22}}>
          <div style={{fontSize:12,color:'#64748b',marginBottom:18,lineHeight:1.6}}>📌 {store.note}</div>
          <a href={API+'/auth/google/start'} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',padding:'13px',borderRadius:10,textDecoration:'none',fontSize:15,fontWeight:700,color:'#fff',fontFamily:"'Rajdhani',sans-serif",background:`linear-gradient(135deg,${store.color}88,${store.color})`}}>
            {store.icon} Login with Google
          </a>
          <div style={{...mn,fontSize:10,color:'#4a6080',textAlign:'center',marginTop:10}}>Redirects to Google official login page</div>
        </div>
      </div>
    </div>;
  }

  async function handleConnect(){
    for(const f of store.fields){if(!vals[f.key]?.trim()){setError('Please fill: '+f.label);return;}}
    setError('');setLoading(true);
    try{
      const r=await fetch(API+'/auth/'+store.id+'/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(vals)});
      const d=await r.json();
      if(d.ok){setDone(true);setTimeout(()=>onSuccess(store.id),900);}
      else setError(d.error||'Connection failed — check credentials');
    }catch(e){setError('Cannot reach server. Is it running on Render.com?');}
    setLoading(false);
  }

  return<div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',backdropFilter:'blur(10px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto'}}>
    <div style={{background:'#0a0f1e',border:`1px solid ${store.border}`,borderRadius:20,width:'100%',maxWidth:480,overflow:'hidden',animation:'fadeIn .3s ease'}}>
      <div style={{background:'#0f1628',borderBottom:'1px solid #1a2540',padding:'18px 22px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:40,height:40,borderRadius:10,background:store.bg,border:`1px solid ${store.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{store.icon}</div>
          <div><div style={{fontSize:16,fontWeight:700,color:'#fff'}}>Connect {store.name}</div><div style={{fontSize:11,color:'#4a6080',marginTop:2}}>Real API — live data</div></div>
        </div>
        <button onClick={onClose} style={{background:'#141d35',border:'1px solid #1a2540',borderRadius:7,width:28,height:28,cursor:'pointer',color:'#4a6080',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>x</button>
      </div>
      <div style={{padding:22}}>
        {done?(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{width:60,height:60,borderRadius:'50%',background:'rgba(0,230,118,.15)',border:'2px solid #00e676',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,margin:'0 auto 14px'}}>✓</div>
            <div style={{fontSize:18,fontWeight:700,color:'#00e676',marginBottom:6}}>Connected!</div>
            <div style={{fontSize:13,color:'#64748b'}}>Fetching real data from {store.name}...</div>
          </div>
        ):(
          <>
            <div style={{background:store.bg,border:`1px solid ${store.border}`,borderRadius:9,padding:12,marginBottom:18,fontSize:11,color:'#c8d8f0',lineHeight:1.6}}>
              🔒 Real connection — credentials go directly to {store.name} API.
              <br/><span style={{color:'#4a6080'}}>📌 {store.note}</span>
            </div>
            {store.fields.map(f=>(
              <div key={f.key} style={{marginBottom:14}}>
                <div style={{...mn,fontSize:9,color:'#4a6080',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:6}}>{f.label}</div>
                {f.type==='textarea'
                  ?<textarea value={vals[f.key]||''} onChange={e=>setVals(v=>({...v,[f.key]:e.target.value}))} placeholder={f.placeholder} rows={5} style={{width:'100%',background:'#0f1628',border:'1px solid #243050',borderRadius:9,padding:'10px 14px',color:'#c8d8f0',fontSize:12,outline:'none',resize:'vertical',fontFamily:"'JetBrains Mono',monospace"}} onFocus={e=>e.target.style.borderColor=store.color} onBlur={e=>e.target.style.borderColor='#243050'}/>
                  :<input type={f.type} value={vals[f.key]||''} onChange={e=>setVals(v=>({...v,[f.key]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&handleConnect()} placeholder={f.placeholder} style={{width:'100%',background:'#0f1628',border:'1px solid #243050',borderRadius:9,padding:'11px 14px',color:'#c8d8f0',fontSize:13,outline:'none',fontFamily:"'Rajdhani',sans-serif"}} onFocus={e=>e.target.style.borderColor=store.color} onBlur={e=>e.target.style.borderColor='#243050'}/>
                }
              </div>
            ))}
            {error&&<div style={{background:'rgba(255,51,85,.08)',border:'1px solid rgba(255,51,85,.3)',borderRadius:8,padding:'9px 13px',marginBottom:14,...mn,fontSize:11,color:'#ff3355'}}>⚠️ {error}</div>}
            <button onClick={handleConnect} disabled={loading} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',cursor:loading?'not-allowed':'pointer',fontSize:15,fontWeight:700,color:'#fff',fontFamily:"'Rajdhani',sans-serif",background:loading?'#1a2540':`linear-gradient(135deg,${store.color}88,${store.color})`,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {loading?<><span style={{width:16,height:16,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'spin .8s linear infinite'}}/> Connecting...</>:<>{store.icon} Connect {store.name}</>}
            </button>
          </>
        )}
      </div>
    </div>
  </div>;
}

function App(){
  const[status,setStatus]=useState({});
  const[liveData,setLiveData]=useState({});
  const[modal,setModal]=useState(null);
  const[view,setView]=useState('dashboard');
  const[toast,setToast]=useState(null);
  const[clock,setClock]=useState('');
  const[dataLoading,setDataLoading]=useState(true);
  const[filter,setFilter]=useState('all');
  const[search,setSearch]=useState('');

  const showToast=(icon,msg)=>{setToast({icon,msg});setTimeout(()=>setToast(null),3500);};

  const fetchStatus=async()=>{try{const r=await fetch(API+'/api/status');const d=await r.json();if(d.ok)setStatus(d.status);}catch(e){}};
  const fetchData=async()=>{try{const r=await fetch(API+'/api/data');const d=await r.json();if(d.ok)setLiveData(d.data);}catch(e){}setDataLoading(false);};

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get('connected')){showToast('✅','Google Play connected!');window.history.replaceState({},'','/');}
    if(p.get('error')){showToast('❌','Error: '+p.get('error'));window.history.replaceState({},'','/');}
    fetchStatus();fetchData();
    const pi=setInterval(()=>{fetchStatus();fetchData();},60000);
    const ci=setInterval(()=>setClock(new Date().toLocaleTimeString('en-IN',{hour12:false})),1000);
    return()=>{clearInterval(pi);clearInterval(ci);};
  },[]);

  const handleDisconnect=async(id)=>{
    await fetch(API+'/api/disconnect/'+id,{method:'POST'});
    await fetchStatus();await fetchData();
    showToast('🔌',STORES.find(s=>s.id===id).name+' disconnected');
  };
  const handleSuccess=(id)=>{setModal(null);showToast('✅',STORES.find(s=>s.id===id).name+' connected!');setTimeout(()=>{fetchStatus();fetchData();},1000);};

  const connCount=Object.values(status).filter(s=>s.connected).length;
  const q=search.toLowerCase();

  const platforms=STORES.map(s=>{
    const isConn=status[s.id]?.connected||false;
    const d=liveData[s.id]||{};
    const app=d.apps?.[0]||{};
    return{...s,isConnected:isConn,email:status[s.id]?.email||null,version:app.version||'—',build:app.build||'—',status2:app.status||'pending',rollout:app.rollout??0,crash:app.crash??null,anr:app.anr??null,error:d.error||null};
  });

  const filtered=platforms.filter(p=>{
    const mf=filter==='all'||p.status2===filter||(filter==='connected'&&p.isConnected)||(filter==='disconnected'&&!p.isConnected);
    const ms=!q||p.name.toLowerCase().includes(q);
    return mf&&ms;
  });

  const stats={conn:connCount,approved:platforms.filter(p=>p.isConnected&&p.status2==='approved').length,review:platforms.filter(p=>p.isConnected&&p.status2==='review').length,rejected:platforms.filter(p=>p.isConnected&&p.status2==='rejected').length};

  return<div style={{background:'#05080f',minHeight:'100vh',color:'#c8d8f0',fontFamily:"'Rajdhani',sans-serif",fontSize:14}}>
    <div style={{position:'fixed',inset:0,backgroundImage:'linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px)',backgroundSize:'50px 50px',pointerEvents:'none',zIndex:0}}/>
    <div style={{position:'relative',zIndex:1}}>
      <header style={{background:'linear-gradient(135deg,#0a0f1e,#0f1628)',borderBottom:'1px solid #1a2540',padding:'11px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,position:'sticky',top:0,zIndex:100,backdropFilter:'blur(12px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:11}}>
          <div style={{width:38,height:38,borderRadius:10,background:'linear-gradient(135deg,#00d4ff,#0055ff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,boxShadow:'0 0 18px rgba(0,212,255,.4)',flexShrink:0}}>📡</div>
          <div>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:2,color:'#fff',lineHeight:1}}>App<span style={{color:'#00d4ff'}}>Radar</span> <span style={{fontSize:12,color:'#4a6080',fontWeight:400}}>PRO</span></div>
            <div style={{...mn,fontSize:8,color:'#4a6080',letterSpacing:2}}>{connCount}/{STORES.length} STORES · REAL DATA</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
          {STORES.map(s=>(
            <div key={s.id} onClick={()=>status[s.id]?.connected?handleDisconnect(s.id):setModal(s)} title={s.name+(status[s.id]?.connected?' (click to disconnect)':' (click to connect)')}
              style={{width:30,height:30,borderRadius:7,background:status[s.id]?.connected?s.bg:'rgba(26,37,64,.5)',border:`1px solid ${status[s.id]?.connected?s.border:'#243050'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,cursor:'pointer',position:'relative',transition:'all .2s'}}>
              {s.icon}
              {status[s.id]?.connected&&<div style={{position:'absolute',top:-3,right:-3,width:9,height:9,background:'#00e676',borderRadius:'50%',border:'1px solid #05080f'}}/>}
            </div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {connCount>0?<div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(0,230,118,.08)',border:'1px solid rgba(0,230,118,.2)',borderRadius:20,padding:'4px 12px',...mn,fontSize:10,color:'#00e676',letterSpacing:1.5}}><div style={{width:6,height:6,background:'#00e676',borderRadius:'50%',animation:'blink 1.4s infinite'}}/>{connCount} LIVE</div>
          :<div style={{...mn,fontSize:10,color:'#ffab00',background:'rgba(255,171,0,.08)',border:'1px solid rgba(255,171,0,.2)',borderRadius:20,padding:'4px 12px',cursor:'pointer'}} onClick={()=>setView('connect')}>NO STORES</div>}
          <div style={{...mn,fontSize:11,color:'#4a6080'}}>{clock}</div>
          <button onClick={()=>{setDataLoading(true);fetchStatus();fetchData();}} style={{background:'#141d35',border:'1px solid #1a2540',borderRadius:8,padding:'6px 12px',color:'#c8d8f0',cursor:'pointer',fontWeight:600,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>↻ Refresh</button>
        </div>
      </header>

      <div style={{background:'#0a0f1e',borderBottom:'1px solid #1a2540',padding:'0 18px',display:'flex'}}>
        {[['dashboard','📊 Dashboard'],['connect','🔌 Connect Stores']].map(([t,l])=>(
          <button key={t} onClick={()=>setView(t)} style={{padding:'11px 18px',border:'none',background:'transparent',cursor:'pointer',fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,color:view===t?'#00d4ff':'#4a6080',borderBottom:view===t?'2px solid #00d4ff':'2px solid transparent',transition:'all .2s'}}>{l}</button>
        ))}
      </div>

      <div style={{padding:'16px 18px'}}>
        {view==='connect'&&(
          <div>
            <div style={{background:'rgba(0,85,255,.06)',border:'1px solid rgba(0,85,255,.2)',borderRadius:12,padding:'14px 18px',marginBottom:20,display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:22}}>🔌</span>
              <div><div style={{fontSize:15,fontWeight:700,color:'#fff'}}>Connect Real Store Accounts</div><div style={{fontSize:12,color:'#4a6080',marginTop:2}}>Real API credentials only — data fetched directly from each store. No fake data.</div></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:12}}>
              {STORES.map(s=>{
                const isConn=status[s.id]?.connected;
                return<div key={s.id} style={{background:'#0a0f1e',border:`1px solid ${isConn?s.border:'#1a2540'}`,borderRadius:13,padding:18,transition:'all .25s',boxShadow:isConn?`0 4px 20px ${s.color}18`:'none'}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.border} onMouseLeave={e=>e.currentTarget.style.borderColor=isConn?s.border:'#1a2540'}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                    <div style={{width:42,height:42,borderRadius:10,background:s.bg,border:`1px solid ${s.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{s.icon}</div>
                    <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:'#fff'}}>{s.name}</div><div style={{...mn,fontSize:8,color:s.color,textTransform:'uppercase',marginTop:2}}>{s.authType==='oauth'?'OAuth Login':'API Key'}</div></div>
                    {isConn&&<div style={{width:10,height:10,borderRadius:'50%',background:'#00e676',boxShadow:'0 0 8px #00e676'}}/>}
                  </div>
                  {isConn?(
                    <div>
                      <div style={{background:'rgba(0,230,118,.07)',border:'1px solid rgba(0,230,118,.2)',borderRadius:9,padding:'10px 13px',marginBottom:12}}>
                        <div style={{fontSize:13,fontWeight:700,color:'#00e676',marginBottom:3}}>✓ Connected</div>
                        {status[s.id]?.email&&<div style={{...mn,fontSize:10,color:'#4a6080'}}>👤 {status[s.id].email}</div>}
                        {liveData[s.id]?.apps?.length>0&&<div style={{...mn,fontSize:10,color:'#00e676',marginTop:2}}>📦 {liveData[s.id].apps.length} app(s) found</div>}
                        {liveData[s.id]?.error&&<div style={{...mn,fontSize:10,color:'#ff3355',marginTop:2}}>⚠️ {liveData[s.id].error}</div>}
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        <button onClick={()=>setModal(s)} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${s.border}`,background:s.bg,color:s.color,cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔄 Re-connect</button>
                        <button onClick={()=>handleDisconnect(s.id)} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid rgba(255,51,85,.3)',background:'rgba(255,51,85,.08)',color:'#ff3355',cursor:'pointer',fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔌 Disconnect</button>
                      </div>
                    </div>
                  ):(
                    <div>
                      <div style={{fontSize:11,color:'#4a6080',marginBottom:12,lineHeight:1.5}}>📌 {s.note}</div>
                      <button onClick={()=>setModal(s)} style={{width:'100%',padding:'11px',borderRadius:9,border:`1px solid ${s.border}`,background:s.bg,color:s.color,cursor:'pointer',fontWeight:700,fontSize:14,fontFamily:"'Rajdhani',sans-serif",display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                        {s.icon} {s.authType==='oauth'?'Login with Google':'Connect '+s.name}
                      </button>
                    </div>
                  )}
                </div>;
              })}
            </div>
          </div>
        )}

        {view==='dashboard'&&(
          <>
            {connCount===0&&<div style={{background:'rgba(255,171,0,.07)',border:'1px solid rgba(255,171,0,.25)',borderRadius:13,padding:'16px 20px',marginBottom:16,display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <span style={{fontSize:28}}>👆</span>
              <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:'#ffab00'}}>No stores connected</div><div style={{fontSize:12,color:'#64748b',marginTop:3}}>Go to Connect Stores tab → enter real API credentials → see live data here</div></div>
              <button onClick={()=>setView('connect')} style={{padding:'9px 18px',borderRadius:9,border:'1px solid rgba(255,171,0,.4)',background:'rgba(255,171,0,.1)',color:'#ffab00',cursor:'pointer',fontWeight:700,fontSize:13,fontFamily:"'Rajdhani',sans-serif"}}>🔌 Connect Stores →</button>
            </div>}

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
              {[{l:'Connected',v:stats.conn,c:'#00d4ff',s:'of '+STORES.length},{l:'Approved',v:stats.approved,c:'#00e676',s:'live'},{l:'In Review',v:stats.review,c:'#ffab00',s:'awaiting'},{l:'Rejected',v:stats.rejected,c:'#ff3355',s:'need fix'}].map((sc,i)=>(
                <div key={i} style={{background:'#0a0f1e',border:'1px solid #1a2540',borderRadius:10,padding:'12px 14px',position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:sc.c}}/>
                  <div style={{...mn,fontSize:8,color:'#4a6080',letterSpacing:1.5,textTransform:'uppercase',marginBottom:4}}>{sc.l}</div>
                  <div style={{fontSize:26,fontWeight:700,color:sc.c}}>{sc.v}</div>
                  <div style={{...mn,fontSize:9,color:'#4a6080',marginTop:2}}>{sc.s}</div>
                </div>
              ))}
            </div>

            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
              {[['all','All'],['connected','🟢 Connected'],['disconnected','⚪ Not Connected'],['approved','✅ Approved'],['review','🔄 Review'],['rejected','❌ Rejected']].map(([f,label])=>(
                <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?'rgba(0,212,255,.06)':'#0a0f1e',border:filter===f?'1px solid #00d4ff':'1px solid #1a2540',borderRadius:7,padding:'5px 11px',color:filter===f?'#00d4ff':'#4a6080',cursor:'pointer',fontWeight:700,fontSize:11,fontFamily:"'Rajdhani',sans-serif"}}>{label}</button>
              ))}
              <div style={{position:'relative',flex:1,minWidth:130}}>
                <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'#4a6080',fontSize:11}}>🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{width:'100%',background:'#0a0f1e',border:'1px solid #1a2540',borderRadius:8,padding:'6px 10px 6px 26px',color:'#c8d8f0',fontSize:12,outline:'none',fontFamily:"'Rajdhani',sans-serif"}}/>
              </div>
            </div>

            {dataLoading&&<div style={{textAlign:'center',padding:40,color:'#4a6080'}}>
              <span style={{width:20,height:20,border:'2px solid #1a2540',borderTopColor:'#00d4ff',borderRadius:'50%',display:'inline-block',animation:'spin .8s linear infinite'}}/>
              <div style={{marginTop:10,...mn,fontSize:11}}>Fetching live store data...</div>
            </div>}

            {!dataLoading&&<div style={{display:'flex',flexDirection:'column',gap:5}}>
              {filtered.map(plat=>{
                const roCol=plat.rollout===100?'#00d4ff':plat.rollout>=70?'#00e676':'#ffab00';
                const roGrad=plat.rollout===100?'linear-gradient(90deg,#0055ff,#00d4ff)':plat.rollout>=70?'linear-gradient(90deg,#00bfa5,#00e676)':'linear-gradient(90deg,#0055ff,#ffab00)';
                return<div key={plat.id} style={{background:'#0a0f1e',border:`1px solid ${plat.isConnected?plat.border:'#1a2540'}`,borderRadius:11,overflow:'hidden',opacity:plat.isConnected?1:.7}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=plat.border} onMouseLeave={e=>e.currentTarget.style.borderColor=plat.isConnected?plat.border:'#1a2540'}>
                  <div style={{display:'flex',alignItems:'center',padding:'12px 14px',gap:10,flexWrap:'wrap'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10,minWidth:200,flex:'0 0 200px'}}>
                      <div style={{width:36,height:36,borderRadius:9,background:plat.bg,border:`1px solid ${plat.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{plat.icon}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:'#fff',display:'flex',alignItems:'center',gap:5}}>
                          {plat.name}
                          {plat.isConnected?<span style={{...mn,fontSize:8,color:'#00e676',background:'rgba(0,230,118,.1)',border:'1px solid rgba(0,230,118,.25)',borderRadius:3,padding:'1px 5px'}}>LIVE</span>
                          :<span style={{...mn,fontSize:8,color:'#4a6080',background:'rgba(100,116,139,.08)',border:'1px solid rgba(100,116,139,.2)',borderRadius:3,padding:'1px 5px'}}>NOT CONNECTED</span>}
                        </div>
                        {plat.isConnected&&plat.email&&<div style={{...mn,fontSize:9,color:'#4a6080',marginTop:1}}>👤 {plat.email}</div>}
                      </div>
                    </div>
                    <div style={{flex:'0 0 110px'}}><Badge status={plat.status2}/></div>
                    <div style={{flex:'0 0 100px'}}>
                      {plat.isConnected?<><div style={{...mn,fontSize:13,fontWeight:700,color:'#00d4ff'}}>v{plat.version}</div><div style={{...mn,fontSize:9,color:'#4a6080',marginTop:1}}>#{plat.build}</div></>
                      :<div style={{...mn,fontSize:11,color:'#2d4060',fontStyle:'italic'}}>—</div>}
                    </div>
                    <div style={{flex:'0 0 105px'}}>
                      {plat.isConnected?<><div style={{...mn,fontSize:12,fontWeight:700,color:cc(plat.crash)}}>{cl(plat.crash)}</div><div style={{...mn,fontSize:8,color:'#4a6080',marginTop:1}}>CRASH</div></>
                      :<div style={{...mn,fontSize:11,color:'#2d4060',fontStyle:'italic'}}>Connect first</div>}
                    </div>
                    <div style={{flex:'0 0 130px'}}>
                      {plat.isConnected?<div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{...mn,fontSize:11,fontWeight:700,color:roCol,width:34,flexShrink:0}}>{plat.rollout}%</span>
                        <div style={{flex:1,height:5,background:'#1a2540',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:`${plat.rollout}%`,background:roGrad,borderRadius:3}}/></div>
                      </div>:<div style={{...mn,fontSize:11,color:'#2d4060'}}>—</div>}
                    </div>
                    <div style={{marginLeft:'auto'}}>
                      {plat.isConnected?<button onClick={()=>handleDisconnect(plat.id)} style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,51,85,.07)',border:'1px solid rgba(255,51,85,.2)',borderRadius:6,padding:'5px 10px',cursor:'pointer',...mn,fontSize:9,color:'#ff3355',fontWeight:700}}>🔌 Disconnect</button>
                      :<button onClick={()=>setModal(STORES.find(s=>s.id===plat.id))} style={{display:'inline-flex',alignItems:'center',gap:4,background:plat.bg,border:`1px solid ${plat.border}`,borderRadius:6,padding:'5px 10px',cursor:'pointer',...mn,fontSize:9,color:plat.color,fontWeight:700}}>🔑 Connect</button>}
                    </div>
                    {plat.isConnected&&plat.error&&<div style={{width:'100%',...mn,fontSize:10,color:'#ff3355',marginTop:4}}>⚠️ {plat.error}</div>}
                  </div>
                </div>;
              })}
            </div>}
          </>
        )}
      </div>
    </div>
    {modal&&<ConnectModal store={modal} onSuccess={handleSuccess} onClose={()=>setModal(null)}/>}
    {toast&&<div style={{position:'fixed',bottom:20,right:20,background:'#0f1628',border:'1px solid #243050',borderRadius:9,padding:'9px 15px',fontSize:13,zIndex:9999,display:'flex',alignItems:'center',gap:7,boxShadow:'0 8px 24px rgba(0,0,0,.5)',color:'#c8d8f0',animation:'fadeIn .3s ease'}}><span>{toast.icon}</span><span>{toast.msg}</span></div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
