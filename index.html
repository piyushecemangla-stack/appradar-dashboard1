// ── MERGE live data over demo ─────────────────────────────────────────────────
function mergeData(demo, liveData) {
  if (!liveData?.platforms) return demo;
  const storeMap={google_play:"gp",app_store:"as",fire_tv:"ft",samsung:"sm",lg:"lg",roku:"rk"};
  return demo.map(row => {
    const storeKey = Object.entries(storeMap).find(([,v])=>v===row.id)?.[0];
    const live = storeKey && liveData.platforms[storeKey];
    if (!live?.connected || !live?.apps?.length) return row;
    const app = live.apps[0]; // first app — extend for multi-app later
    return {
      ...row,
      currentVer:  app.versionName  || app.versionString || row.currentVer,
      buildNo:     app.versionCode  || app.buildNumber   || row.buildNo,
      status:      app.status       || row.status,
      crash:       app.crash        ?? row.crash,
      anr:         app.anr          ?? row.anr,
      lastUpdated: app.lastUpdated  || row.lastUpdated,
      isLive:      true,
    };
  });
}

}

function Dashboard(){
  const[platforms,setPlatforms]=useState(JSON.parse(JSON.stringify(DEMO)));
  const[liveData,setLiveData]=useState(null);
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[forceModal,setForceModal]=useState(null);
  const[showSecrets,setShowSecrets]=useState(false);
  const[toast,setToast]=useState(null);
  const[clock,setClock]=useState("");
  const[spinning,setSpinning]=useState(false);
  const[lastFetch,setLastFetch]=useState(null);
  const[liveCount,setLiveCount]=useState(0);

  // clock
  useEffect(()=>{
    const t=setInterval(()=>setClock(new Date().toLocaleTimeString("en-IN",{hour12:false})),1000);
    return()=>clearInterval(t);
  },[]);

  // fetch data.json on load and every 5 mins
  const fetchData=async()=>{
    try{
      const res=await fetch("data.json?t="+Date.now());
      if(!res.ok)throw new Error("data.json not found");
      const json=await res.json();
      setLiveData(json);
      const merged=mergeData(DEMO,json);
      setPlatforms(merged);
      setLiveCount(merged.filter(p=>p.isLive).length);
      setLastFetch(new Date().toLocaleTimeString());
    }catch(e){
      // no live data yet — stay on demo
    }
  };

  useEffect(()=>{
    fetchData();
    const t=setInterval(fetchData,5*60*1000);
    return()=>clearInterval(t);
  },[]);

  const showToast=(icon,msg)=>{setToast({icon,msg});setTimeout(()=>setToast(null),3000);};

  const doRefresh=()=>{
    setSpinning(true);
    fetchData().then(()=>{
      setSpinning(false);
      showToast("🔄","Data refreshed");
    }).catch(()=>{setSpinning(false);showToast("⚠️","Using demo data — connect stores to see live data");});
  };

  const handleForce=(pct,forceMode)=>{
    setPlatforms(prev=>prev.map(p=>p.id===forceModal.id?{...p,rollout:pct,force:forceMode}:p));
    showToast(forceMode&&pct===100?"⚡":"📈",`${PL[forceModal.id].short} → ${pct}%${forceMode?" · Force ON":""}`);
    setForceModal(null);
  };

  const stats={
    total:platforms.length,
    approved:platforms.filter(p=>["approved","live"].includes(p.status)).length,
    review:platforms.filter(p=>p.status==="review").length,
    rejected:platforms.filter(p=>p.status==="rejected").length,
    forced:platforms.filter(p=>p.force).length,
    wc:[...platforms].filter(p=>p.crash!==null).sort((a,b)=>b.crash-a.crash)[0],
    wa:[...platforms].filter(p=>p.anr!==null).sort((a,b)=>b.anr-a.anr)[0],
  };

  const q=search.toLowerCase();
  const filtered=platforms.filter(p=>{
    const mf=filter==="all"||p.status===filter||(filter==="force"&&p.force)||(filter==="highcrash"&&p.crash>=1.5);
    const ms=!q||PL[p.id].name.toLowerCase().includes(q)||p.currentVer.includes(q)||p.status.includes(q);
    return mf&&ms;
  });

  const isAllLive=liveCount===platforms.length;
  const hasAnyLive=liveCount>0;

  return<div style={{background:"#05080f",minHeight:"100vh",color:"#c8d8f0",fontFamily:"'Rajdhani',sans-serif",fontSize:14}}>
    <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px)",backgroundSize:"50px 50px",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>

      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#0a0f1e,#0f1628)",borderBottom:"1px solid #1a2540",padding:"11px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#00d4ff,#0055ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 0 18px rgba(0,212,255,.4)",flexShrink:0}}>📡</div>
          <div>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:2,color:"#fff",lineHeight:1}}>App<span style={{color:"#00d4ff"}}>Radar</span> <span style={{fontSize:12,color:"#4a6080",fontWeight:400}}>PRO</span></div>
            <div style={{...mn,fontSize:8,color:"#4a6080",letterSpacing:2}}>1 APP · {platforms.length} PLATFORMS · {hasAnyLive?`${liveCount} LIVE`:"DEMO MODE"}</div>
          </div>
        </div>

        {/* LIVE STATUS */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {hasAnyLive
            ?<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(0,230,118,.08)",border:"1px solid rgba(0,230,118,.2)",borderRadius:20,padding:"4px 11px",...mn,fontSize:10,color:"#00e676",letterSpacing:1.5}}>
               <div style={{width:6,height:6,background:"#00e676",borderRadius:"50%",animation:"blink 1.4s infinite"}}/>
               {liveCount}/{platforms.length} LIVE
             </div>
            :<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,171,0,.08)",border:"1px solid rgba(255,171,0,.2)",borderRadius:20,padding:"4px 11px",...mn,fontSize:10,color:"#ffab00",letterSpacing:1.5,cursor:"pointer"}} onClick={()=>setShowSecrets(true)}>
               ⚠️ DEMO MODE — Click to connect stores
             </div>
          }
          <div style={{...mn,fontSize:11,color:"#4a6080"}}>{clock}</div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowSecrets(true)} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(0,212,255,.08)",border:"1px solid rgba(0,212,255,.25)",borderRadius:8,padding:"6px 13px",color:"#00d4ff",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔑 Connect Stores</button>
          <button onClick={doRefresh} style={{display:"flex",alignItems:"center",gap:4,background:"#141d35",border:"1px solid #1a2540",borderRadius:8,padding:"6px 13px",color:"#c8d8f0",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>
            <span style={{display:"inline-block",transition:"transform .8s",transform:spinning?"rotate(360deg)":"none"}}>↻</span> Refresh
          </button>
        </div>
      </header>

      {/* DEMO BANNER */}
      {!hasAnyLive&&<div style={{background:"linear-gradient(135deg,rgba(255,171,0,.07),rgba(255,107,53,.05))",borderBottom:"1px solid rgba(255,171,0,.2)",padding:"10px 18px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:16}}>⚠️</span>
        <span style={{fontSize:13,color:"#ffab00",fontWeight:600}}>Demo Mode — Showing sample data.</span>
        <span style={{fontSize:12,color:"#64748b"}}>To see real data: add your API keys as GitHub Secrets, then run the workflow.</span>
        <button onClick={()=>setShowSecrets(true)} style={{marginLeft:"auto",padding:"5px 14px",borderRadius:7,border:"1px solid rgba(255,171,0,.4)",background:"rgba(255,171,0,.08)",color:"#ffab00",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔑 Setup Guide →</button>
      </div>}

      {/* LAST UPDATED */}
      {lastFetch&&<div style={{background:"rgba(0,230,118,.04)",borderBottom:"1px solid rgba(0,230,118,.1)",padding:"6px 18px",...mn,fontSize:10,color:"#00e676"}}>
        ✅ Live data loaded · Last fetched: {lastFetch} · Next auto-refresh: 5 min
      </div>}

      <div style={{padding:"14px 18px"}}>

        {/* STATS */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
          {[{l:"Platforms",v:stats.total,c:"#00d4ff",s:"tracked"},{l:"Live/Approved",v:stats.approved,c:"#00e676",s:"deployed"},{l:"In Review",v:stats.review,c:"#ffab00",s:"awaiting"},{l:"Rejected",v:stats.rejected,c:"#ff3355",s:"need fix"}].map((sc,i)=>(
            <div key={i} style={{background:"#0a0f1e",border:"1px solid #1a2540",borderRadius:10,padding:"11px 14px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:sc.c}}/>
              <div style={{...mn,fontSize:8,color:"#4a6080",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{sc.l}</div>
              <div style={{fontSize:26,fontWeight:700,color:sc.c}}>{sc.v}</div>
              <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:2}}>{sc.s}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
          {[
            {l:"Worst Crash",v:stats.wc?stats.wc.crash.toFixed(2)+"%":"—",c:"#ff3355",s:stats.wc?PL[stats.wc.id]?.short:""},
            {l:"Worst ANR",  v:stats.wa?stats.wa.anr.toFixed(2)+"%":"—",  c:"#ffab00",s:stats.wa?PL[stats.wa.id]?.short:""},
            {l:"Force Active",v:stats.forced,c:"#ff3355",s:"forced deploys"},
            {l:"Data Status", v:hasAnyLive?`${liveCount} Live`:"Demo",c:hasAnyLive?"#00e676":"#ffab00",s:hasAnyLive?"from store APIs":"add secrets"},
          ].map((sc,i)=>(
            <div key={i} style={{background:"#0a0f1e",border:"1px solid #1a2540",borderRadius:10,padding:"11px 14px",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:sc.c}}/>
              <div style={{...mn,fontSize:8,color:"#4a6080",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{sc.l}</div>
              <div style={{fontSize:26,fontWeight:700,color:sc.c}}>{sc.v}</div>
              <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sc.s}</div>
            </div>
          ))}
        </div>

        {/* FILTERS */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
          {[["all","All"],["approved","✅ Live"],["review","🔄 Review"],["rejected","❌ Rejected"],["pending","⏸ Pending"],["force","⚡ Forced"],["highcrash","🔴 High Crash"]].map(([f,label])=>(
            <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"rgba(0,212,255,.06)":"#0a0f1e",border:filter===f?"1px solid #00d4ff":"1px solid #1a2540",borderRadius:7,padding:"5px 11px",color:filter===f?"#00d4ff":"#4a6080",cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"'Rajdhani',sans-serif"}}>
              {label}
            </button>
          ))}
          <div style={{position:"relative",flex:1,minWidth:140}}>
            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#4a6080",fontSize:11}}>🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search platform, version…" style={{width:"100%",background:"#0a0f1e",border:"1px solid #1a2540",borderRadius:8,padding:"6px 10px 6px 26px",color:"#c8d8f0",fontSize:12,outline:"none",fontFamily:"'Rajdhani',sans-serif"}}/>
          </div>
          <span style={{...mn,fontSize:10,color:"#4a6080"}}>{filtered.length}/{platforms.length}</span>
        </div>

        {/* APP HEADER */}
        <div style={{background:"linear-gradient(135deg,rgba(0,212,255,.05),rgba(0,85,255,.03))",border:"1px solid rgba(0,212,255,.18)",borderRadius:13,padding:"12px 16px",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:42,height:42,borderRadius:11,background:"linear-gradient(135deg,#1a3a5c,#0d1b2a)",border:"1px solid rgba(0,212,255,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📺</div>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>StreamMax — Video Streaming App</div>
              <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:2}}>com.streammax.app · {platforms.length} platforms tracked</div>
            </div>
          </div>
          <div style={{...mn,fontSize:11,color:"#4a6080"}}>{filtered.length} / {platforms.length} shown</div>
        </div>

        {/* PLATFORM ROWS */}
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {filtered.map(plat=>{
            const p=PL[plat.id];
            const roCol=plat.force?"#ff3355":plat.rollout===100?"#00d4ff":plat.rollout>=70?"#00e676":"#ffab00";
            const roGrad=plat.force?"linear-gradient(90deg,#9b1c2e,#ff3355)":plat.rollout===100?"linear-gradient(90deg,#0055ff,#00d4ff)":plat.rollout>=70?"linear-gradient(90deg,#00bfa5,#00e676)":"linear-gradient(90deg,#0055ff,#ffab00)";
            return(
              <div key={plat.id} style={{background:"#0a0f1e",border:`1px solid ${plat.status==="rejected"?"rgba(255,51,85,.25)":plat.status==="review"?"rgba(255,171,0,.15)":"#1a2540"}`,borderRadius:11,overflow:"hidden",animation:"fadeIn .3s ease"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=p.border}
                onMouseLeave={e=>e.currentTarget.style.borderColor=plat.status==="rejected"?"rgba(255,51,85,.25)":plat.status==="review"?"rgba(255,171,0,.15)":"#1a2540"}>
                <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:10,flexWrap:"wrap"}}>

                  {/* platform */}
                  <div style={{display:"flex",alignItems:"center",gap:9,minWidth:190,flex:"0 0 190px"}}>
                    <div style={{width:34,height:34,borderRadius:8,background:p.bg,border:`1px solid ${p.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{p.icon}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:"#fff",lineHeight:1.2,display:"flex",alignItems:"center",gap:4}}>
                        {p.name}<LiveDot isLive={plat.isLive}/>
                      </div>
                      <span style={{...mn,fontSize:8,color:p.color,background:p.bg,border:`1px solid ${p.border}`,padding:"1px 5px",borderRadius:3,marginTop:2,display:"inline-block"}}>{p.category}</span>
                    </div>
                  </div>

                  {/* status */}
                  <div style={{flex:"0 0 110px"}}><Badge status={plat.status}/></div>

                  {/* version */}
                  <div style={{flex:"0 0 100px"}}>
                    <div style={{...mn,fontSize:13,fontWeight:700,color:"#00d4ff"}}>v{plat.currentVer}</div>
                    <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:1}}>#{plat.buildNo}</div>
                  </div>

                  {/* prev version */}
                  <div style={{flex:"0 0 90px"}}>
                    <div style={{...mn,fontSize:11,color:"#4a6080"}}>v{plat.prevVer}</div>
                    <div style={{...mn,fontSize:9,color:"#2d4060",marginTop:1}}>#{plat.prevBuild}</div>
                  </div>

                  {/* crash */}
                  <div style={{flex:"0 0 105px"}}>
                    <div style={{...mn,fontSize:12,fontWeight:700,color:cc(plat.crash)}}>{cl(plat.crash)}</div>
                    <div style={{...mn,fontSize:8,color:"#4a6080",marginTop:1}}>CRASH</div>
                    {plat.crash!==null&&<div style={{height:3,background:"#1a2540",borderRadius:2,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(plat.crash*20,100)}%`,background:cc(plat.crash),borderRadius:2}}/></div>}
                  </div>

                  {/* anr */}
                  <div style={{flex:"0 0 95px"}}>
                    <div style={{...mn,fontSize:12,fontWeight:700,color:cc(plat.anr!==null?plat.anr*3:null)}}>{cl(plat.anr)}</div>
                    <div style={{...mn,fontSize:8,color:"#4a6080",marginTop:1}}>ANR</div>
                    {plat.anr!==null&&<div style={{height:3,background:"#1a2540",borderRadius:2,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(plat.anr*100,100)}%`,background:cc(plat.anr*3),borderRadius:2}}/></div>}
                  </div>

                  {/* rollout */}
                  <div style={{flex:"0 0 130px",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{...mn,fontSize:11,fontWeight:700,color:roCol,width:34,flexShrink:0}}>{plat.rollout}%</span>
                    <div style={{flex:1,height:5,background:"#1a2540",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${plat.rollout}%`,background:roGrad,borderRadius:3,transition:"width .5s",boxShadow:plat.rollout===100?`0 0 7px ${roCol}55`:"none"}}/>
                    </div>
                    {plat.force&&<span style={{...mn,fontSize:9,color:"#ff3355",fontWeight:700}}>⚡</span>}
                  </div>

                  {/* force btn */}
                  <div style={{display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>setForceModal(plat)} style={{display:"inline-flex",alignItems:"center",gap:3,background:plat.force?"rgba(255,51,85,.2)":"rgba(255,51,85,.08)",border:`1px solid ${plat.force?"#ff3355":"rgba(255,51,85,.25)"}`,borderRadius:5,padding:"4px 9px",cursor:"pointer",...mn,fontSize:9,fontWeight:700,color:"#ff3355",whiteSpace:"nowrap",boxShadow:plat.force?"0 0 8px rgba(255,51,85,.35)":"none"}}>
                      {plat.force?"⚡ FORCED":"⚡ Force"}
                    </button>
                  </div>

                  {/* remarks */}
                  <div style={{flex:"1 1 130px",minWidth:0}}>
                    {plat.remarks?<div style={{fontSize:10,color:"#4a6080",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={plat.remarks}>{plat.remarks}</div>:<span style={{...mn,fontSize:9,color:"#2d4060",fontStyle:"italic"}}>—</span>}
                    <div style={{...mn,fontSize:9,color:"#2d4060",marginTop:1}}>{plat.lastUpdated}</div>
                  </div>
                </div>

                {/* rejection/review banner */}
                {(plat.status==="rejected"||plat.status==="review")&&plat.remarks&&(
                  <div style={{borderTop:`1px solid ${plat.status==="rejected"?"rgba(255,51,85,.2)":"rgba(255,171,0,.15)"}`,background:plat.status==="rejected"?"rgba(255,51,85,.04)":"rgba(255,171,0,.04)",padding:"7px 14px",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:11}}>{plat.status==="rejected"?"❌":"🔄"}</span>
                    <span style={{fontSize:11,color:plat.status==="rejected"?"#ff3355":"#ffab00",flex:1}}>{plat.remarks}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>

    {forceModal&&<ForceModal platform={forceModal} onConfirm={handleForce} onClose={()=>setForceModal(null)}/>}
    {showSecrets&&<SecretsGuide onClose={()=>setShowSecrets(false)}/>}
    {toast&&<div style={{position:"fixed",bottom:20,right:20,background:"#0f1628",border:"1px solid #243050",borderRadius:9,padding:"9px 15px",fontSize:12,zIndex:9999,display:"flex",alignItems:"center",gap:6,boxShadow:"0 8px 24px rgba(0,0,0,.4)",color:"#c8d8f0",animation:"fadeIn .25s ease"}}><span>{toast.icon}</span><span>{toast.msg}</span></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
