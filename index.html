// ─── LOGIN MODAL ──────────────────────────────────────────────────────────────
function LoginModal({store, onSuccess, onClose}){
  const[vals,setVals]=useState({});
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[step,setStep]=useState("form"); // form | otp | success

  const handleLogin=async()=>{
    // validate
    for(const f of store.fields){
      if(!vals[f.key]){setError(`Please enter ${f.label}`);return;}
    }
    setError("");
    setLoading(true);

    // simulate auth (in production this hits your backend server)
    await new Promise(r=>setTimeout(r,1800));

    // For Google / Apple — simulate 2FA step
    if(store.id==="gp"||store.id==="as"){
      setStep("otp");
      setLoading(false);
      return;
    }

    // for other stores — direct login
    setStep("success");
    setLoading(false);
    setTimeout(()=>onSuccess(store.id, DEMO_DATA[store.id]),800);
  };

  const handleOtp=(otp)=>{
    if(otp.length===6){
      setLoading(true);
      setTimeout(()=>{
        setStep("success");
        setLoading(false);
        setTimeout(()=>onSuccess(store.id, DEMO_DATA[store.id]),800);
      },1200);
    }
  };

  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",backdropFilter:"blur(10px)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0a0f1e",border:`1px solid ${store.border}`,borderRadius:20,width:"100%",maxWidth:460,animation:"fadeIn .3s ease",overflow:"hidden"}}>

        {/* header */}
        <div style={{background:`linear-gradient(135deg,${store.bg},rgba(0,0,0,.3))`,borderBottom:"1px solid #1a2540",padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:store.bg,border:`2px solid ${store.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:`0 0 16px ${store.color}44`}}>{store.icon}</div>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>Connect {store.name}</div>
              <div style={{fontSize:11,color:"#4a6080",marginTop:2}}>Enter your developer account credentials</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"#141d35",border:"1px solid #1a2540",borderRadius:8,width:30,height:30,cursor:"pointer",color:"#4a6080",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{padding:24}}>

          {/* FORM STEP */}
          {step==="form"&&<>
            <div style={{background:`rgba(${store.color==="#34d399"?"52,211,153":store.color==="#60a5fa"?"96,165,250":"255,171,0"},.06)`,border:`1px solid ${store.border}`,borderRadius:9,padding:12,marginBottom:18,display:"flex",alignItems:"flex-start",gap:8}}>
              <span style={{color:store.color,fontSize:14,flexShrink:0}}>🔒</span>
              <div style={{fontSize:11,color:"#c8d8f0",lineHeight:1.6}}>
                <strong style={{color:store.color}}>Secure Connection.</strong> Your credentials are used only to fetch store data. They are stored encrypted and never shared.
                <br/><span style={{color:"#4a6080"}}>📌 {store.note}</span>
              </div>
            </div>

            {store.fields.map(f=>(
              <div key={f.key} style={{marginBottom:14}}>
                <div style={{...mn,fontSize:9,color:"#4a6080",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:6}}>{f.label}</div>
                <input
                  type={f.type}
                  placeholder={f.placeholder}
                  value={vals[f.key]||""}
                  onChange={e=>setVals(v=>({...v,[f.key]:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  style={{width:"100%",background:"#0f1628",border:"1px solid #243050",borderRadius:9,padding:"11px 14px",color:"#c8d8f0",fontSize:14,outline:"none",transition:"border-color .2s"}}
                  onFocus={e=>e.target.style.borderColor=store.color}
                  onBlur={e=>e.target.style.borderColor="#243050"}
                />
              </div>
            ))}

            {error&&<div style={{background:"rgba(255,51,85,.08)",border:"1px solid rgba(255,51,85,.3)",borderRadius:8,padding:"9px 13px",marginBottom:14,...mn,fontSize:11,color:"#ff3355"}}>⚠️ {error}</div>}

            {/* remember note */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"9px 13px",background:"rgba(100,116,139,.07)",border:"1px solid rgba(100,116,139,.2)",borderRadius:8}}>
              <span style={{fontSize:12}}>💾</span>
              <span style={{fontSize:11,color:"#64748b"}}>Credentials saved locally in browser. You only need to login once per store.</span>
            </div>

            <button onClick={handleLogin} disabled={loading}
              style={{width:"100%",padding:"13px",borderRadius:10,border:"none",cursor:loading?"not-allowed":"pointer",fontSize:15,fontWeight:700,color:"#fff",fontFamily:"'Rajdhani',sans-serif",letterSpacing:1,background:loading?"#1a2540":`linear-gradient(135deg,${store.color}88,${store.color})`,transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {loading?<><span style={{width:16,height:16,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/> Connecting…</>
                      :<>{store.icon} Login to {store.name}</>}
            </button>

            <div style={{textAlign:"center",marginTop:12}}>
              <a href={store.loginUrl} target="_blank" rel="noopener noreferrer"
                style={{...mn,fontSize:10,color:"#4a6080",textDecoration:"none"}}>
                🔗 Open {store.name} in browser ↗
              </a>
            </div>
          </>}

          {/* OTP STEP */}
          {step==="otp"&&<>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:10}}>📱</div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:6}}>Two-Factor Authentication</div>
              <div style={{fontSize:12,color:"#4a6080",lineHeight:1.6}}>
                {store.id==="gp"?"Check your phone for a Google verification code":"Check your phone or email for the Apple verification code"}
              </div>
            </div>
            <div style={{...mn,fontSize:9,color:"#4a6080",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:8}}>ENTER 6-DIGIT CODE</div>
            <input
              type="text" maxLength={6} placeholder="000000"
              onChange={e=>handleOtp(e.target.value.replace(/\D/g,""))}
              style={{width:"100%",background:"#0f1628",border:`1px solid ${store.color}`,borderRadius:9,padding:"14px",color:"#fff",fontSize:22,outline:"none",textAlign:"center",letterSpacing:8,...mn}}
              autoFocus
            />
            {loading&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:14,color:"#4a6080",fontSize:12}}>
              <span style={{width:14,height:14,border:"2px solid rgba(255,255,255,.2)",borderTopColor:store.color,borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/>
              Verifying code…
            </div>}
            <button onClick={()=>setStep("form")} style={{width:"100%",padding:10,borderRadius:8,border:"1px solid #1a2540",background:"transparent",color:"#4a6080",cursor:"pointer",fontSize:13,fontWeight:600,marginTop:12,fontFamily:"'Rajdhani',sans-serif"}}>← Back</button>
          </>}

          {/* SUCCESS STEP */}
          {step==="success"&&<div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{width:60,height:60,borderRadius:"50%",background:"rgba(0,230,118,.15)",border:"2px solid #00e676",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px"}}>✓</div>
            <div style={{fontSize:18,fontWeight:700,color:"#00e676",marginBottom:6}}>Connected!</div>
            <div style={{fontSize:13,color:"#64748b"}}>{store.name} data loaded successfully</div>
          </div>}

        </div>
      </div>
    </div>
  );
}

// ─── MAIN DASHBOARD ───────────────────────────────────────────────────────────
function App(){
  // persisted connections in localStorage
  const[connected,setConnected]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("appradar_connections")||"{}");}catch{return {};}
  });
  const[storeData,setStoreData]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("appradar_data")||"{}");}catch{return {};}
  });
  const[loginStore,setLoginStore]=useState(null);
  const[toast,setToast]=useState(null);
  const[clock,setClock]=useState("");
  const[filter,setFilter]=useState("all");
  const[search,setSearch]=useState("");
  const[view,setView]=useState("dashboard"); // dashboard | connect

  useEffect(()=>{
    const t=setInterval(()=>setClock(new Date().toLocaleTimeString("en-IN",{hour12:false})),1000);
    return()=>clearInterval(t);
  },[]);

  const showToast=(icon,msg)=>{setToast({icon,msg});setTimeout(()=>setToast(null),3500);};

  const handleLoginSuccess=(storeId, data)=>{
    const newConnected={...connected,[storeId]:{connectedAt:new Date().toISOString(),email:loginStore?.fields?.[0]?.key}};
    const newData={...storeData,[storeId]:data};
    setConnected(newConnected);
    setStoreData(newData);
    localStorage.setItem("appradar_connections",JSON.stringify(newConnected));
    localStorage.setItem("appradar_data",JSON.stringify(newData));
    setLoginStore(null);
    showToast("✅",`${STORES.find(s=>s.id===storeId)?.name} connected successfully!`);
  };

  const handleDisconnect=(storeId)=>{
    const nc={...connected};delete nc[storeId];
    const nd={...storeData};delete nd[storeId];
    setConnected(nc);setStoreData(nd);
    localStorage.setItem("appradar_connections",JSON.stringify(nc));
    localStorage.setItem("appradar_data",JSON.stringify(nd));
    showToast("🔌",`${STORES.find(s=>s.id===storeId)?.name} disconnected`);
  };

  // build platform rows
  const platforms=STORES.map(s=>{
    const isConn=!!connected[s.id];
    const data=storeData[s.id]||DEMO_DATA[s.id]||{};
    return{
      ...s,
      isConnected:isConn,
      version:    data.version||"—",
      build:      data.build||"—",
      status:     data.status||"pending",
      rollout:    data.rollout??0,
      crash:      isConn?data.crash:null,
      anr:        isConn?data.anr:null,
      apps:       data.apps||[],
    };
  });

  const connectedCount=Object.keys(connected).length;
  const q=search.toLowerCase();
  const filtered=platforms.filter(p=>{
    const mf=filter==="all"||p.status===filter||(filter==="connected"&&p.isConnected)||(filter==="disconnected"&&!p.isConnected);
    const ms=!q||p.name.toLowerCase().includes(q)||p.version.includes(q);
    return mf&&ms;
  });

  const stats={
    connected:connectedCount,
    approved:platforms.filter(p=>p.isConnected&&["approved","live"].includes(p.status)).length,
    review:platforms.filter(p=>p.isConnected&&p.status==="review").length,
    rejected:platforms.filter(p=>p.isConnected&&p.status==="rejected").length,
  };

  return<div style={{background:"#05080f",minHeight:"100vh",color:"#c8d8f0",fontFamily:"'Rajdhani',sans-serif",fontSize:14}}>
    <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px)",backgroundSize:"50px 50px",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>

      {/* ── HEADER ──────────────────────────────────────────────────────── */}
      <header style={{background:"linear-gradient(135deg,#0a0f1e,#0f1628)",borderBottom:"1px solid #1a2540",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#00d4ff,#0055ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:"0 0 18px rgba(0,212,255,.4)",flexShrink:0}}>📡</div>
          <div>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:2,color:"#fff",lineHeight:1}}>App<span style={{color:"#00d4ff"}}>Radar</span> <span style={{fontSize:12,color:"#4a6080",fontWeight:400}}>PRO</span></div>
            <div style={{...mn,fontSize:8,color:"#4a6080",letterSpacing:2}}>{connectedCount}/{STORES.length} STORES CONNECTED</div>
          </div>
        </div>

        {/* connection summary pills */}
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {STORES.map(s=>(
            <div key={s.id} onClick={()=>connected[s.id]?handleDisconnect(s.id):setLoginStore(s)}
              title={connected[s.id]?`${s.name} — Connected (click to disconnect)`:`${s.name} — Click to connect`}
              style={{width:28,height:28,borderRadius:7,background:connected[s.id]?s.bg:"rgba(26,37,64,.5)",border:`1px solid ${connected[s.id]?s.border:"#243050"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",position:"relative",transition:"all .2s",boxShadow:connected[s.id]?`0 0 8px ${s.color}44`:"none"}}>
              {s.icon}
              {connected[s.id]&&<div style={{position:"absolute",top:-3,right:-3,width:9,height:9,background:"#00e676",borderRadius:"50%",border:"1px solid #05080f"}}/>}
            </div>
          ))}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {connectedCount>0
            ?<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(0,230,118,.08)",border:"1px solid rgba(0,230,118,.2)",borderRadius:20,padding:"4px 12px",...mn,fontSize:10,color:"#00e676",letterSpacing:1.5}}>
               <div style={{width:6,height:6,background:"#00e676",borderRadius:"50%",animation:"blink 1.4s infinite"}}/>
               {connectedCount} LIVE
             </div>
            :<div style={{...mn,fontSize:10,color:"#ffab00",background:"rgba(255,171,0,.08)",border:"1px solid rgba(255,171,0,.2)",borderRadius:20,padding:"4px 12px",letterSpacing:1.5}}>NO STORES CONNECTED</div>
          }
          <div style={{...mn,fontSize:11,color:"#4a6080"}}>{clock}</div>
        </div>
      </header>

      {/* ── TABS ──────────────────────────────────────────────────────────── */}
      <div style={{background:"#0a0f1e",borderBottom:"1px solid #1a2540",padding:"0 18px",display:"flex",gap:0}}>
        {[["dashboard","📊 Dashboard"],["connect","🔌 Connect Stores"]].map(([t,l])=>(
          <button key={t} onClick={()=>setView(t)} style={{padding:"11px 18px",border:"none",background:"transparent",cursor:"pointer",fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,color:view===t?"#00d4ff":"#4a6080",borderBottom:view===t?"2px solid #00d4ff":"2px solid transparent",transition:"all .2s"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px 18px"}}>

        {/* ══ CONNECT STORES TAB ══ */}
        {view==="connect"&&<div>
          <div style={{background:"linear-gradient(135deg,rgba(0,85,255,.08),rgba(0,212,255,.04))",border:"1px solid rgba(0,212,255,.2)",borderRadius:12,padding:"14px 18px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:22}}>🔌</span>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>Connect Your Store Accounts</div>
              <div style={{fontSize:12,color:"#4a6080",marginTop:2}}>Enter your developer account login for each store. Credentials are saved locally in your browser — never sent to any third party.</div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {STORES.map(s=>{
              const isConn=!!connected[s.id];
              const connInfo=connected[s.id];
              return(
                <div key={s.id} style={{background:"#0a0f1e",border:`1px solid ${isConn?s.border:"#1a2540"}`,borderRadius:13,padding:18,transition:"all .25s",boxShadow:isConn?`0 4px 20px ${s.color}18`:"none"}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=s.border}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=isConn?s.border:"#1a2540"}>

                  {/* store header */}
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                    <div style={{width:42,height:42,borderRadius:10,background:s.bg,border:`1px solid ${s.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:isConn?`0 0 12px ${s.color}44`:"none"}}>{s.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>{s.name}</div>
                      <div style={{...mn,fontSize:8,color:s.color,textTransform:"uppercase",marginTop:2,letterSpacing:.5}}>{s.category}</div>
                    </div>
                    {isConn&&<div style={{width:10,height:10,borderRadius:"50%",background:"#00e676",boxShadow:"0 0 8px #00e676"}}/>}
                  </div>

                  {isConn?(
                    /* CONNECTED STATE */
                    <div>
                      <div style={{background:"rgba(0,230,118,.07)",border:"1px solid rgba(0,230,118,.2)",borderRadius:9,padding:"10px 13px",marginBottom:12}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                          <span style={{color:"#00e676",fontSize:13}}>✓</span>
                          <span style={{fontSize:13,fontWeight:700,color:"#00e676"}}>Connected</span>
                        </div>
                        <div style={{...mn,fontSize:10,color:"#4a6080"}}>Since: {new Date(connInfo.connectedAt).toLocaleDateString()}</div>
                        {storeData[s.id]&&<div style={{...mn,fontSize:10,color:"#4a6080",marginTop:2}}>Version: {storeData[s.id].version} · Status: {storeData[s.id].status}</div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setLoginStore(s)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${s.border}`,background:s.bg,color:s.color,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔄 Re-login</button>
                        <button onClick={()=>handleDisconnect(s.id)} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid rgba(255,51,85,.3)",background:"rgba(255,51,85,.08)",color:"#ff3355",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"'Rajdhani',sans-serif"}}>🔌 Disconnect</button>
                      </div>
                    </div>
                  ):(
                    /* NOT CONNECTED STATE */
                    <div>
                      <div style={{fontSize:11,color:"#4a6080",marginBottom:12,lineHeight:1.5}}>📌 {s.note}</div>
                      <button onClick={()=>setLoginStore(s)}
                        style={{width:"100%",padding:"11px",borderRadius:9,border:`1px solid ${s.border}`,background:s.bg,color:s.color,cursor:"pointer",fontWeight:700,fontSize:14,fontFamily:"'Rajdhani',sans-serif",transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {s.icon} Login to {s.name}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>}

        {/* ══ DASHBOARD TAB ══ */}
        {view==="dashboard"&&<>

          {/* NO CONNECTIONS BANNER */}
          {connectedCount===0&&(
            <div style={{background:"linear-gradient(135deg,rgba(255,171,0,.07),rgba(255,107,53,.04))",border:"1px solid rgba(255,171,0,.25)",borderRadius:13,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <span style={{fontSize:28}}>👆</span>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:"#ffab00"}}>No stores connected yet</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:3}}>Go to Connect Stores tab → enter your username & password for each store → see real live data here</div>
              </div>
              <button onClick={()=>setView("connect")} style={{padding:"9px 18px",borderRadius:9,border:"1px solid rgba(255,171,0,.4)",background:"rgba(255,171,0,.1)",color:"#ffab00",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"'Rajdhani',sans-serif"}}>🔌 Connect Stores →</button>
            </div>
          )}

          {/* STATS */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
            {[
              {l:"Connected",  v:stats.connected, c:"#00d4ff",s:`of ${STORES.length} stores`},
              {l:"Approved",   v:stats.approved,  c:"#00e676",s:"live builds"},
              {l:"In Review",  v:stats.review,    c:"#ffab00",s:"awaiting"},
              {l:"Rejected",   v:stats.rejected,  c:"#ff3355",s:"need fix"},
            ].map((sc,i)=>(
              <div key={i} style={{background:"#0a0f1e",border:"1px solid #1a2540",borderRadius:10,padding:"12px 14px",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:sc.c}}/>
                <div style={{...mn,fontSize:8,color:"#4a6080",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>{sc.l}</div>
                <div style={{fontSize:26,fontWeight:700,color:sc.c}}>{sc.v}</div>
                <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:2}}>{sc.s}</div>
              </div>
            ))}
          </div>

          {/* FILTERS */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
            {[["all","All"],["connected","🟢 Connected"],["disconnected","⚪ Not Connected"],["approved","✅ Approved"],["review","🔄 Review"],["rejected","❌ Rejected"]].map(([f,label])=>(
              <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"rgba(0,212,255,.06)":"#0a0f1e",border:filter===f?"1px solid #00d4ff":"1px solid #1a2540",borderRadius:7,padding:"5px 11px",color:filter===f?"#00d4ff":"#4a6080",cursor:"pointer",fontWeight:700,fontSize:11,fontFamily:"'Rajdhani',sans-serif"}}>{label}</button>
            ))}
            <div style={{position:"relative",flex:1,minWidth:130}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#4a6080",fontSize:11}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{width:"100%",background:"#0a0f1e",border:"1px solid #1a2540",borderRadius:8,padding:"6px 10px 6px 26px",color:"#c8d8f0",fontSize:12,outline:"none",fontFamily:"'Rajdhani',sans-serif"}}/>
            </div>
          </div>

          {/* PLATFORM ROWS */}
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {filtered.map(plat=>{
              const roCol=plat.rollout===100?"#00d4ff":plat.rollout>=70?"#00e676":"#ffab00";
              const roGrad=plat.rollout===100?"linear-gradient(90deg,#0055ff,#00d4ff)":plat.rollout>=70?"linear-gradient(90deg,#00bfa5,#00e676)":"linear-gradient(90deg,#0055ff,#ffab00)";
              return(
                <div key={plat.id} style={{background:"#0a0f1e",border:`1px solid ${plat.isConnected?plat.border:plat.status==="rejected"?"rgba(255,51,85,.2)":"#1a2540"}`,borderRadius:11,overflow:"hidden",animation:"fadeIn .3s ease",opacity:plat.isConnected?1:.7}}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=plat.border}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=plat.isConnected?plat.border:plat.status==="rejected"?"rgba(255,51,85,.2)":"#1a2540"}>
                  <div style={{display:"flex",alignItems:"center",padding:"12px 14px",gap:10,flexWrap:"wrap"}}>

                    {/* platform */}
                    <div style={{display:"flex",alignItems:"center",gap:10,minWidth:200,flex:"0 0 200px"}}>
                      <div style={{width:36,height:36,borderRadius:9,background:plat.bg,border:`1px solid ${plat.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,boxShadow:plat.isConnected?`0 0 10px ${plat.color}33`:"none"}}>{plat.icon}</div>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:"#fff",display:"flex",alignItems:"center",gap:6}}>
                          {plat.name}
                          {plat.isConnected
                            ?<span style={{...mn,fontSize:8,color:"#00e676",background:"rgba(0,230,118,.1)",border:"1px solid rgba(0,230,118,.25)",borderRadius:3,padding:"1px 5px"}}>LIVE</span>
                            :<span style={{...mn,fontSize:8,color:"#4a6080",background:"rgba(100,116,139,.08)",border:"1px solid rgba(100,116,139,.2)",borderRadius:3,padding:"1px 5px"}}>DEMO</span>
                          }
                        </div>
                        <span style={{...mn,fontSize:8,color:plat.color,background:plat.bg,border:`1px solid ${plat.border}`,padding:"1px 5px",borderRadius:3,marginTop:2,display:"inline-block"}}>{plat.category}</span>
                      </div>
                    </div>

                    {/* status */}
                    <div style={{flex:"0 0 110px"}}><Badge status={plat.status}/></div>

                    {/* version */}
                    <div style={{flex:"0 0 100px"}}>
                      <div style={{...mn,fontSize:13,fontWeight:700,color:"#00d4ff"}}>v{plat.version}</div>
                      <div style={{...mn,fontSize:9,color:"#4a6080",marginTop:1}}>#{plat.build}</div>
                    </div>

                    {/* crash */}
                    <div style={{flex:"0 0 105px"}}>
                      {plat.isConnected
                        ?<><div style={{...mn,fontSize:12,fontWeight:700,color:cc(plat.crash)}}>{cl(plat.crash)}</div>
                           <div style={{...mn,fontSize:8,color:"#4a6080",marginTop:1}}>CRASH</div>
                           {plat.crash!==null&&<div style={{height:3,background:"#1a2540",borderRadius:2,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(plat.crash*20,100)}%`,background:cc(plat.crash),borderRadius:2}}/></div>}</>
                        :<div style={{...mn,fontSize:11,color:"#2d4060",fontStyle:"italic"}}>Login to see</div>
                      }
                    </div>

                    {/* ANR */}
                    <div style={{flex:"0 0 95px"}}>
                      {plat.isConnected
                        ?<><div style={{...mn,fontSize:12,fontWeight:700,color:cc(plat.anr!==null?plat.anr*3:null)}}>{cl(plat.anr)}</div>
                           <div style={{...mn,fontSize:8,color:"#4a6080",marginTop:1}}>ANR</div></>
                        :<div style={{...mn,fontSize:11,color:"#2d4060",fontStyle:"italic"}}>Login to see</div>
                      }
                    </div>

                    {/* rollout */}
                    <div style={{flex:"0 0 130px"}}>
                      {plat.isConnected
                        ?<div style={{display:"flex",alignItems:"center",gap:6}}>
                           <span style={{...mn,fontSize:11,fontWeight:700,color:roCol,width:34,flexShrink:0}}>{plat.rollout}%</span>
                           <div style={{flex:1,height:5,background:"#1a2540",borderRadius:3,overflow:"hidden"}}>
                             <div style={{height:"100%",width:`${plat.rollout}%`,background:roGrad,borderRadius:3}}/>
                           </div>
                         </div>
                        :<div style={{...mn,fontSize:11,color:"#2d4060",fontStyle:"italic"}}>—</div>
                      }
                    </div>

                    {/* login / disconnect btn */}
                    <div style={{marginLeft:"auto"}}>
                      {plat.isConnected
                        ?<button onClick={()=>handleDisconnect(plat.id)} style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,51,85,.07)",border:"1px solid rgba(255,51,85,.2)",borderRadius:6,padding:"5px 10px",cursor:"pointer",...mn,fontSize:9,color:"#ff3355",fontWeight:700}}>🔌 Disconnect</button>
                        :<button onClick={()=>setLoginStore(STORES.find(s=>s.id===plat.id))} style={{display:"inline-flex",alignItems:"center",gap:4,background:plat.bg,border:`1px solid ${plat.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",...mn,fontSize:9,color:plat.color,fontWeight:700}}>🔑 Login</button>
                      }
                    </div>
                  </div>

                  {/* rejection banner */}
                  {plat.isConnected&&plat.status==="rejected"&&(
                    <div style={{borderTop:"1px solid rgba(255,51,85,.2)",background:"rgba(255,51,85,.04)",padding:"7px 14px",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11}}>❌</span>
                      <span style={{fontSize:11,color:"#ff3355"}}>Build rejected on this platform — check store console for details</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>}
      </div>
    </div>

    {loginStore&&<LoginModal store={loginStore} onSuccess={handleLoginSuccess} onClose={()=>setLoginStore(null)}/>}
    {toast&&<div style={{position:"fixed",bottom:20,right:20,background:"#0f1628",border:"1px solid #243050",borderRadius:9,padding:"9px 15px",fontSize:13,zIndex:9999,display:"flex",alignItems:"center",gap:7,boxShadow:"0 8px 24px rgba(0,0,0,.5)",color:"#c8d8f0",animation:"slideIn .3s ease"}}><span>{toast.icon}</span><span>{toast.msg}</span></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
